<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Naranja</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/css/coreui.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.min.css">
    <link rel="icon" href="img/721098.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.1.0/mdb.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/js/coreui.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-warning-subtle">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">HOTEL NARANJA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu"
                aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav w-100 mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="index.html">INICIO</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicios.html">SERVICIOS</a></li>
                    <li class="nav-item"><a class="nav-link" href="habitaciones.html">HABITACIONES</a></li>
                    <li class="nav-item"><a class="nav-link" href="fotos.html">FOTOS</a></li>
                </ul>
            </div>
            <div class="position-relative ms-auto">
                <a class="nav-link position-relative" href="#" onclick="mostrarCarritoNavbar()">
                    🛒
                    <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div id="carritoDropdown" class="bg-light border shadow p-3 rounded"
        style="display:none; position:absolute; top:70px; right:20px; width:350px; z-index:9999; max-height:400px; overflow-y:auto;">
        <h5>🛒 Tu carrito</h5>
        <div id="carritoContenido"></div>
    </div>

    <img src="img/imagenHotel.png" class="img-fluid w-100 d-block" alt="Hotel Naranja"
        style="height: 75vh; object-fit: cover; max-width: 100vw;">

    <div class="container mt-4">
        <div class="d-flex flex-row justify-content-center gap-3 mt-3 flex-wrap">
            <div>
                <label class="form-label">Llegada</label>
                <input type="date" class="form-control" id="entrada">
            </div>
            <div>
                <label class="form-label">Salida</label>
                <input type="date" class="form-control" id="salida">
            </div>
            <div>
                <label class="form-label">Personas</label>
                <input type="number" class="form-control" id="personas" min="1" value="1">
            </div>
            <div class="d-flex align-items-end">
                <button class="btn btn-warning fs-2" onclick="buscar()">Buscar</button>
            </div>
        </div>
    </div>

    <br>

    <div class="d-flex justify-content-center">
        <h2>Habitaciones</h2>
    </div>

    <div class="container bg-warning-subtle px-5 overflow-hidden">
    <div id="carouselHabitaciones" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselHabitaciones" data-bs-slide-to="0" class="active" aria-current="true"></button>
            <button type="button" data-bs-target="#carouselHabitaciones" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#carouselHabitaciones" data-bs-slide-to="2"></button>
            <button type="button" data-bs-target="#carouselHabitaciones" data-bs-slide-to="3"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <div style="height:75vh; background-image:url('img/habitacion-individual-madrid-1030x630.jpg'); background-size:cover; background-position:center;"></div>
                <div class="carousel-caption d-none d-md-block"><h5>Habitación Individual</h5></div>
            </div>
            <div class="carousel-item">
                <div style="height:75vh; background-image:url('img/doble.jpg'); background-size:cover; background-position:center;"></div>
                <div class="carousel-caption d-none d-md-block"><h5>Habitación Doble</h5></div>
            </div>
            <div class="carousel-item">
                <div style="height:75vh; background-image:url('img/cuadruple.jpg'); background-size:cover; background-position:center;"></div>
                <div class="carousel-caption d-none d-md-block"><h5>Habitación Cuádruple</h5></div>
            </div>
            <div class="carousel-item">
                <div style="height:75vh; background-image:url('img/tipos-habitaciones-hotel-portada.jpg'); background-size:cover; background-position:center;"></div>
                <div class="carousel-caption d-none d-md-block"><h5>Suite Presidencial</h5></div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselHabitaciones" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselHabitaciones" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Siguiente</span>
        </button>
    </div>
    </div>

    <br>

    <div class="d-flex justify-content-center">
        <h2>Servicios</h2>
    </div>

    <div class="container bg-warning-subtle px-5 overflow-hidden">
    <div id="carouselServicios" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselServicios" data-bs-slide-to="0" class="active" aria-current="true"></button>
            <button type="button" data-bs-target="#carouselServicios" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#carouselServicios" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <div style="height:75vh; background-image:url('img/desayunoBueno.jpg'); background-size:cover; background-position:center;"></div>
                <div class="carousel-caption d-none d-md-block"><h5>Alojamiento y desayuno</h5></div>
            </div>
            <div class="carousel-item">
                <div style="height:75vh; background-image:url('img/comidaBuena.jpg'); background-size:cover; background-position:center;"></div>
                <div class="carousel-caption d-none d-md-block"><h5>Pensión Completa</h5></div>
            </div>
            <div class="carousel-item">
                <div style="height:75vh; background-image:url('img/todoBueno.jpg'); background-size:cover; background-position:center;"></div>
                <div class="carousel-caption d-none d-md-block"><h5>Todo incluido</h5></div>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselServicios" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselServicios" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Siguiente</span>
        </button>
    </div>
    </div>

    <br>

    <div class="d-flex justify-content-center">
        <h2>¿Donde encontrarnos?</h2>
    </div>
    <div class="container bg-warning-subtle px-5 overflow-hidden">
        <div class="d-flex justify-content-center">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12466.705709159083!2d-0.025766094711294516!3d38.63332425852895!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd620014c1ff75f9%3A0xd59fb6994068e694!2s03590%20Altea%20Hills%2C%20Alicante!5e0!3m2!1ses!2ses!4v1777283842320!5m2!1ses!2ses"
                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade" class="w-100 vh-15"></iframe>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            new bootstrap.Carousel(document.getElementById("carouselHabitaciones"), {
                interval: 3000, wrap: true
            });
            new bootstrap.Carousel(document.getElementById("carouselServicios"), {
                interval: 4000, wrap: true
            });
        });

        function buscar() {
            const entrada = document.getElementById("entrada").value;
            const salida = document.getElementById("salida").value;
            const personas = document.getElementById("personas").value;
            if (!entrada || !salida) {
                alert("Selecciona fechas");
                return;
            }
            localStorage.setItem("entrada", entrada);
            localStorage.setItem("salida", salida);
            localStorage.setItem("personas", personas);
            window.location.href = "reservas.html";
        }
    </script>

</body>
</html>
